target-version = "py313"
line-length = 100
exclude = [".venv", "mobile", "var"]

[lint]
# pyflakes (F), pycodestyle errors (E), isort (I), pyupgrade (UP), bugbear (B)
select = ["E4", "E7", "E9", "F", "I", "UP", "B"]
# UP042: keep `(str, Enum)` — switching to StrEnum changes str(member) and would
# break the `.value`-based Mongo matching the stores rely on.
ignore = ["UP042"]

[lint.flake8-bugbear]
# FastAPI dependency injection puts these calls in argument defaults by design.
extend-immutable-calls = [
  "fastapi.Depends",
  "fastapi.Query",
  "fastapi.Cookie",
  "fastapi.Header",
  "fastapi.Path",
  "fastapi.Body",
  "fastapi.Form",
]

[lint.per-file-ignores]
# tests deliberately assert against broad exceptions
"tests/*" = ["B017"]
