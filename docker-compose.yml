# Local infra for development. Start Qdrant (semantic memory / RAG) with:
#   docker compose up -d qdrant
# Data persists in the named volume; dashboard at http://localhost:6333/dashboard
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # REST/gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
