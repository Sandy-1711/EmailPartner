# Pre-commit checks for the backend (Python). One-time setup, from the repo
# root with the venv active:
#   python -m pre_commit install                       # ruff + pyright on commit
#   python -m pre_commit install --hook-type pre-push  # pytest on push
# Run manually any time: python -m pre_commit run --all-files
#
# Hooks use the venv's tools (language: system), so commit/push from the
# activated venv (or PATH must resolve `python` to it).
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: python -m ruff check --force-exclude
        language: system
        types: [python]
        require_serial: true

      - id: pyright
        name: pyright (types)
        entry: python -m pyright
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: python -m pytest -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
